syntax = "proto3";

option java_package = "com.diabdata.glanceWidget.proto";
option java_multiple_files = true;

message WidgetDevice {
  string name = 1;
  string type = 2;
  int32 daysLeft = 3;
  int32 lifespanProgression = 4;
  string lifeSpanEndDate = 5;
}

message WidgetAppointment {
  string date = 1;
  string doctor = 2;
  string type = 3;
}

// Le conteneur principal pour l'état complet du widget
message WidgetState {
  WidgetAppointment next_appointment = 1;
  repeated WidgetDevice devices = 2;
  int64 last_updated = 3;
}
